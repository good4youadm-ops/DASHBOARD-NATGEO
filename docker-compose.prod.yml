version: '3.9'

services:
  api:
    build:
      context: .
      target: production
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    volumes:
      - logs_data:/app/logs
    command: ["node", "dist/src/api/server.js"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  sync-worker:
    build:
      context: .
      target: production
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - logs_data:/app/logs
    command: ["node", "dist/workers/oracle-sync/index.js", "all"]
    depends_on:
      api:
        condition: service_healthy

volumes:
  logs_data:
    driver: local
