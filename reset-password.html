<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NatGeo — Nova senha</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #1a4731; --accent2: #2d6a4f; --accent3: #40916c;
      --accent-bg: #f0f7f3; --accent-mid: #d8efe4;
      --bg: #f5f5f7; --surface: #ffffff;
      --border: #e5e5ea; --text: #1d1d1f; --text2: #3a3a3c; --muted: #8e8e93;
      --red: #ff3b30; --radius: 14px;
      --shadow-md: 0 8px 40px rgba(0,0,0,.10), 0 1px 4px rgba(0,0,0,.06);
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      font-family: -apple-system,'SF Pro Display','Helvetica Neue',Arial,sans-serif;
      display: flex; align-items: center; justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { width: 100%; max-width: 420px; padding: 24px; }
    .logo {
      display: flex; align-items: center; gap: 12px;
      justify-content: center; margin-bottom: 32px;
    }
    .logo-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--accent); display: flex; align-items: center;
      justify-content: center; color: #fff; font-size: 1.2rem;
    }
    .logo-name { font-size: 1.4rem; font-weight: 700; color: var(--text); }
    .logo-name span { color: var(--accent3); }
    .card {
      background: var(--surface); border-radius: var(--radius);
      box-shadow: var(--shadow-md); padding: 36px 32px;
    }
    h1 { font-size: 1.25rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .subtitle { font-size: .85rem; color: var(--muted); margin-bottom: 28px; }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: .78rem; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
    .input-wrap { position: relative; }
    input[type="password"] {
      width: 100%; padding: 10px 14px; padding-right: 40px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: .9rem; color: var(--text); background: var(--bg);
      transition: border-color .15s; outline: none;
    }
    input:focus { border-color: var(--accent3); background: #fff; }
    .input-icon {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: .85rem; cursor: pointer;
    }
    .btn {
      width: 100%; padding: 12px; border: none; border-radius: 10px;
      background: var(--accent); color: #fff; font-size: .95rem;
      font-weight: 600; cursor: pointer; transition: background .15s, opacity .15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:hover { background: var(--accent2); }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .msg {
      display: none; margin-top: 14px; padding: 10px 14px;
      border-radius: 8px; font-size: .82rem; align-items: center; gap: 8px;
    }
    .msg.error  { background: #fff1f0; border: 1px solid #ffccc7; color: var(--red); }
    .msg.success { background: #f0f7f3; border: 1px solid var(--accent-mid); color: var(--accent); }
    .msg.show   { display: flex; }
    .invalid-wrap { text-align: center; padding: 20px 0; }
    .invalid-wrap p { color: var(--muted); font-size: .9rem; margin-bottom: 16px; }
    .back-link { color: var(--accent3); text-decoration: none; font-size: .85rem; }
    .back-link:hover { text-decoration: underline; }
    .footer-note { text-align: center; margin-top: 20px; font-size: .75rem; color: var(--muted); }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon"><i class="fa-solid fa-leaf"></i></div>
    <div class="logo-name">Nat<span>Geo</span></div>
  </div>

  <div class="card" id="mainCard">
    <!-- conteúdo injetado pelo JS -->
    <p style="text-align:center;color:var(--muted);font-size:.9rem">Carregando…</p>
  </div>

  <p class="footer-note">NatGeo Distribuidora &copy; 2025</p>
</div>

<script>
(async function () {
  'use strict';

  var card = document.getElementById('mainCard');

  // Lê os parâmetros do hash (#access_token=...&type=recovery)
  var hash = window.location.hash.substring(1);
  var params = {};
  hash.split('&').forEach(function (p) {
    var parts = p.split('=');
    if (parts.length === 2) params[decodeURIComponent(parts[0])] = decodeURIComponent(parts[1]);
  });

  var accessToken = params['access_token'];
  var tokenType   = params['type'];

  // Carrega config do servidor
  var cfg = null;
  try {
    cfg = await fetch('/api/config').then(function (r) { return r.json(); });
  } catch (e) {
    card.innerHTML = '<div class="invalid-wrap"><p>Não foi possível conectar ao servidor.</p><a class="back-link" href="login.html">Voltar ao login</a></div>';
    return;
  }

  var supabaseUrl     = cfg.supabaseUrl;
  var supabaseAnonKey = cfg.supabaseAnonKey;

  // Link inválido ou expirado
  if (!accessToken || tokenType !== 'recovery') {
    card.innerHTML = '<div class="invalid-wrap">' +
      '<i class="fa-solid fa-triangle-exclamation" style="font-size:2rem;color:var(--red);margin-bottom:12px;display:block"></i>' +
      '<p>Link de recuperação inválido ou expirado.</p>' +
      '<a class="back-link" href="login.html">Voltar ao login</a>' +
      '</div>';
    return;
  }

  // Renderiza o formulário
  card.innerHTML =
    '<h1>Criar nova senha</h1>' +
    '<p class="subtitle">Digite e confirme sua nova senha abaixo.</p>' +
    '<form id="resetForm" novalidate>' +
      '<div class="field">' +
        '<label for="pw1">Nova senha</label>' +
        '<div class="input-wrap">' +
          '<input type="password" id="pw1" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required />' +
          '<span class="input-icon" id="toggle1"><i class="fa-solid fa-eye" id="eye1"></i></span>' +
        '</div>' +
      '</div>' +
      '<div class="field">' +
        '<label for="pw2">Confirmar senha</label>' +
        '<div class="input-wrap">' +
          '<input type="password" id="pw2" placeholder="Repita a senha" autocomplete="new-password" required />' +
          '<span class="input-icon" id="toggle2"><i class="fa-solid fa-eye" id="eye2"></i></span>' +
        '</div>' +
      '</div>' +
      '<button type="submit" class="btn" id="submitBtn">' +
        '<i class="fa-solid fa-lock"></i>' +
        '<span id="btnText">Salvar nova senha</span>' +
      '</button>' +
      '<div class="msg error" id="errMsg"><i class="fa-solid fa-circle-exclamation"></i><span id="errText"></span></div>' +
      '<div class="msg success" id="okMsg"><i class="fa-solid fa-circle-check"></i><span>Senha alterada com sucesso! Redirecionando…</span></div>' +
    '</form>';

  function togglePw(inputId, eyeId) {
    var inp = document.getElementById(inputId);
    var ico = document.getElementById(eyeId);
    if (inp.type === 'password') { inp.type = 'text'; ico.className = 'fa-solid fa-eye-slash'; }
    else                         { inp.type = 'password'; ico.className = 'fa-solid fa-eye'; }
  }
  document.getElementById('toggle1').addEventListener('click', function () { togglePw('pw1', 'eye1'); });
  document.getElementById('toggle2').addEventListener('click', function () { togglePw('pw2', 'eye2'); });

  document.getElementById('resetForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    document.getElementById('errMsg').classList.remove('show');

    var pw1 = document.getElementById('pw1').value;
    var pw2 = document.getElementById('pw2').value;

    if (pw1.length < 8) {
      showErr('A senha deve ter no mínimo 8 caracteres.');
      return;
    }
    if (pw1 !== pw2) {
      showErr('As senhas não coincidem.');
      return;
    }

    var btn  = document.getElementById('submitBtn');
    var text = document.getElementById('btnText');
    btn.disabled = true;
    text.textContent = 'Salvando…';

    try {
      var resp = await fetch(supabaseUrl + '/auth/v1/user', {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'apikey': supabaseAnonKey,
          'Authorization': 'Bearer ' + accessToken,
        },
        body: JSON.stringify({ password: pw1 }),
      });

      var data = await resp.json();

      if (!resp.ok) {
        showErr(data.msg || data.error_description || 'Erro ao atualizar a senha. Tente solicitar um novo link.');
        btn.disabled = false;
        text.textContent = 'Salvar nova senha';
        return;
      }

      document.getElementById('okMsg').classList.add('show');
      localStorage.removeItem('natgeo_auth');
      setTimeout(function () { window.location.replace('login.html'); }, 2500);

    } catch (err) {
      showErr('Erro de conexão. Verifique sua internet e tente novamente.');
      btn.disabled = false;
      text.textContent = 'Salvar nova senha';
    }
  });

  function showErr(msg) {
    document.getElementById('errText').textContent = msg;
    document.getElementById('errMsg').classList.add('show');
  }
}());
</script>
</body>
</html>
